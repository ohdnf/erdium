name: Release Deploy

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  deploy-production:
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}

    steps:
      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: End-to-end tests
        run: pnpm test:e2e

      - name: Pull Vercel production environment
        run: pnpm dlx vercel@latest pull --yes --environment=production --token="${VERCEL_TOKEN}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel production output
        run: pnpm dlx vercel@latest build --prod --token="${VERCEL_TOKEN}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Vercel production output
        run: pnpm dlx vercel@latest deploy --prebuilt --prod --token="${VERCEL_TOKEN}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Summarize production deployment
        run: |
          {
            echo "### Vercel production deployment"
            echo
            echo "- Release: ${{ github.event.release.tag_name }}"
            echo "- Production URL: https://erdium.vercel.app"
          } >> "$GITHUB_STEP_SUMMARY"
